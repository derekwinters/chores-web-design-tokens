name: PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm test

  maven-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm run build
      # Runner images ship Temurin JDK 17 (JAVA_HOME_17_X64); no setup-java needed.
      - run: JAVA_HOME="$JAVA_HOME_17_X64" ./gradlew build --no-daemon
        working-directory: android-artifact
