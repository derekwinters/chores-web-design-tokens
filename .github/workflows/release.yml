name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    uses: derekwinters/chores-web-actions/.github/workflows/release-please.yml@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm test
      # publishConfig.registry points at npm.pkg.github.com; only auth is needed.
      - run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm publish
      # Zero-auth consumption path: attach the same tarball to the GitHub
      # release so consumers can depend on the public asset URL without
      # registry credentials (decision recorded in the README).
      - run: npm pack
      - run: gh release upload "design-tokens-v${{ needs.release-please.outputs.version }}" ./*.tgz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-maven:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm run build
      # Runner images ship Temurin JDK 17 (JAVA_HOME_17_X64); no setup-java needed.
      - run: JAVA_HOME="$JAVA_HOME_17_X64" ./gradlew publish --no-daemon -Pversion=${{ needs.release-please.outputs.version }}
        working-directory: android-artifact
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
